name: Restrict public pull requests

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-external-pr:
    name: Close external pull requests
    runs-on: ubuntu-latest
    steps:
      - name: Check author permission
        id: permission
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const username = context.payload.pull_request.user.login;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username
              });
              core.setOutput("permission", data.permission);
              core.setOutput("allowed", ["admin", "maintain", "write"].includes(data.permission) ? "true" : "false");
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.setOutput("permission", "none");
              core.setOutput("allowed", "false");
            }

      - name: Close pull request from non-project developer
        if: steps.permission.outputs.allowed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                "Thanks for your interest in Realtime Mail Standard.",
                "",
                "This repository currently accepts pull requests only from project developers with write access.",
                "Please open a discussion or issue first if you want to propose a change."
              ].join("\n")
            });
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: issue_number,
              state: "closed"
            });
