[package]
name = "realtime-mail"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Rust SDK for the Realtime Mail draft standard"

[dependencies]
base64 = "0.22"
ed25519-dalek = { version = "2", features = ["rand_core"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
